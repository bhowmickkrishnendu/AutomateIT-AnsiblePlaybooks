---
- name: Configure monitoring stack host
  hosts: monitoring
  become: true

  vars:
    prometheus_version: 2.54.1
    grafana_version: 11.1.4
    node_exporter_version: 1.8.2

  tasks:
    - name: Install required OS packages
      apt:
        name:
          - wget
          - tar
          - adduser
          - libfontconfig1
        state: present
        update_cache: true

    - name: Create service users
      user:
        name: "{{ item }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false
      loop:
        - prometheus
        - node_exporter

    - name: Create Prometheus directories
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
        group: prometheus
        mode: "0755"
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Download and unpack Prometheus
      unarchive:
        src: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: /opt
        remote_src: true
        creates: "/opt/prometheus-{{ prometheus_version }}.linux-amd64"

    - name: Install Prometheus binaries
      copy:
        src: "/opt/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        remote_src: true
        mode: "0755"
      loop:
        - prometheus
        - promtool

    - name: Configure Prometheus scrape targets
      copy:
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: prometheus
              static_configs:
                - targets: ['localhost:9090']

            - job_name: node_exporter
              static_configs:
                - targets: ['localhost:9100']

    - name: Create Prometheus systemd unit file
      copy:
        dest: /etc/systemd/system/prometheus.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=prometheus
          Group=prometheus
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/var/lib/prometheus \
            --web.listen-address=:9090
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Prometheus
      systemd:
        name: prometheus
        daemon_reload: true
        enabled: true
        state: started

    - name: Download Grafana package
      get_url:
        url: "https://dl.grafana.com/oss/release/grafana_{{ grafana_version }}_amd64.deb"
        dest: /tmp/grafana_amd64.deb
        mode: "0644"

    - name: Install Grafana package
      apt:
        deb: /tmp/grafana_amd64.deb

    - name: Ensure Grafana is enabled and running
      systemd:
        name: grafana-server
        enabled: true
        state: started

    - name: Download and unpack Node Exporter
      unarchive:
        src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /opt
        remote_src: true
        creates: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64"

    - name: Install Node Exporter binary
      copy:
        src: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        remote_src: true
        mode: "0755"

    - name: Create Node Exporter systemd unit file
      copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Node Exporter
      systemd:
        name: node_exporter
        daemon_reload: true
        enabled: true
        state: started
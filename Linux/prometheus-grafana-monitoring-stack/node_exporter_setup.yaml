---
- name: Configure Node Exporter on client systems
  hosts: client_systems
  become: true

  vars:
    node_exporter_version: 1.8.2

  tasks:
    - name: Install required OS packages
      apt:
        name:
          - wget
          - tar
        state: present
        update_cache: true

    - name: Create node_exporter user
      user:
        name: node_exporter
        shell: /usr/sbin/nologin
        system: true
        create_home: false

    - name: Download and unpack Node Exporter
      unarchive:
        src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /opt
        remote_src: true
        creates: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64"

    - name: Install Node Exporter binary
      copy:
        src: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        remote_src: true
        mode: "0755"

    - name: Create Node Exporter systemd unit file
      copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Node Exporter service
      systemd:
        name: node_exporter
        daemon_reload: true
        enabled: true
        state: started